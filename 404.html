<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0E1B2C" />
  <title>Page not found · Naveen Madhav</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0E1B2C; color: #E6DFD2;
      font-family: "Inter", system-ui, sans-serif; text-align: center; padding: 24px;
    }
    .eyebrow {
      font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase; color: #D9B47E; margin: 0 0 18px;
    }
    h1 { font-family: "Fraunces", Georgia, serif; font-weight: 500; font-size: clamp(2.4rem, 7vw, 4rem); line-height: 1.05; margin: 0 0 16px; }
    p { color: #B3AE9F; max-width: 46ch; margin: 0 auto 32px; line-height: 1.6; }
    a.btn {
      display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
      background: #D9B47E; color: #101B2A; font-weight: 600; font-size: .95rem;
      padding: 14px 26px; border-radius: 12px; transition: transform .2s, background .2s;
    }
    a.btn:hover { background: #C9A462; transform: translateY(-1px); }
    a.btn:focus-visible { outline: 2px solid #D9B47E; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 · Page not found</p>
    <h1>This page wandered off.</h1>
    <p>The link may be old, or the page may have moved. Everything worth seeing is back on the home page.</p>
    <a class="btn" href="/">&larr; Back to the portfolio</a>
  </main>
</body>
</html>
