<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0404" />
  <title>Page not found · Naveen Sereddy</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d0404; color: #f0e4d3;
      font-family: "Outfit", Arial, sans-serif; text-align: center; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .eyebrow {
      font-family: "Outfit", Arial, sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase; color: #d0923a; margin: 0 0 18px;
    }
    h1 { font-family: "Outfit", Arial, sans-serif; font-weight: 500; font-size: clamp(2.4rem, 7vw, 4rem); line-height: 1.05; letter-spacing: -0.02em; margin: 0 0 16px; }
    p { color: #b8a58f; max-width: 46ch; margin: 0 auto 32px; line-height: 1.7; }
    a.btn {
      display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
      background: #d0923a; color: #0d0404; font-weight: 600; font-size: .95rem;
      padding: 14px 26px; border-radius: 10px; transition: filter .2s, transform .2s;
    }
    a.btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    a.btn:focus-visible { outline: 2px solid #d0923a; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 · Page not found</p>
    <h1>This page wandered off.</h1>
    <p>The link may be old, or the page may have moved. Everything worth seeing is back on the home page.</p>
    <a class="btn" href="/">&larr; Back to the portfolio</a>
  </main>
</body>
</html>
