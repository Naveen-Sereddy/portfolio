<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<title>Pip — Character Animation States</title>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <meta name="design_doc_mode" content="canvas">
  <style>
    body { margin: 0; background: #F7F6F3; }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }
    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(0.02); opacity: 0; }
      90%, 96% { transform: scaleY(1); opacity: 1; }
    }
    @keyframes happyBounce {
      0% { transform: translateY(0) scale(1) rotate(0deg); }
      15% { transform: translateY(-34px) scale(1.05,0.95) rotate(-4deg); }
      30% { transform: translateY(0) scale(0.97,1.05) rotate(3deg); }
      45% { transform: translateY(-22px) scale(1.04,0.96) rotate(-3deg); }
      60% { transform: translateY(0) scale(0.98,1.03) rotate(2deg); }
      72% { transform: translateY(-12px) scale(1.02,0.98) rotate(-2deg); }
      85% { transform: translateY(0) rotate(1deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes wingFlapHappy {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-32deg); }
      40% { transform: rotate(10deg); }
      60% { transform: rotate(-28deg); }
      80% { transform: rotate(6deg); }
    }
    @keyframes danceSwayBody {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      25% { transform: rotate(-6deg) translateX(-10px); }
      50% { transform: rotate(0deg) translateX(0); }
      75% { transform: rotate(6deg) translateX(10px); }
    }
    @keyframes danceWingL {
      0%, 100% { transform: rotate(-8deg); }
      25% { transform: rotate(-40deg); }
      50% { transform: rotate(-8deg); }
      75% { transform: rotate(6deg); }
    }
    @keyframes danceWingR {
      0%, 100% { transform: rotate(8deg); }
      25% { transform: rotate(-6deg); }
      50% { transform: rotate(8deg); }
      75% { transform: rotate(40deg); }
    }
    @keyframes danceFootL {
      0%, 40%, 100% { transform: translateY(0); }
      20% { transform: translateY(-9px); }
    }
    @keyframes danceFootR {
      0%, 100% { transform: translateY(0); }
      60%, 80% { transform: translateY(0); }
      70% { transform: translateY(-9px); }
    }
    @keyframes headBop {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-5deg) translateY(-3px); }
      50% { transform: rotate(0deg) translateY(0); }
      75% { transform: rotate(5deg) translateY(-3px); }
    }
    @keyframes correctFlash {
      0% { opacity: 0; }
      15% { opacity: 0.55; }
      100% { opacity: 0; }
    }
    @keyframes checkPop {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      55% { transform: scale(1.25) rotate(4deg); opacity: 1; }
      75% { transform: scale(0.95) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes confettiBurst {
      0% { transform: translate(0,0) rotate(0deg) scale(0.4); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1); opacity: 0; }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-14px) rotate(-6deg); }
      30% { transform: translateX(12px) rotate(5deg); }
      45% { transform: translateX(-10px) rotate(-4deg); }
      60% { transform: translateX(8px) rotate(3deg); }
      75% { transform: translateX(-5px) rotate(-2deg); }
      90% { transform: translateX(3px) rotate(1deg); }
    }
    @keyframes xPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes levelupBodyPulse {
      0% { transform: scale(1); }
      20% { transform: scale(1.12); }
      40% { transform: scale(0.98); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes glowPulse {
      0% { transform: scale(0.6); opacity: 0; }
      30% { transform: scale(1.15); opacity: 0.9; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes crownDrop {
      0% { transform: translateY(-220px) rotate(-18deg); opacity: 0; }
      55% { transform: translateY(6px) rotate(4deg); opacity: 1; }
      72% { transform: translateY(-8px) rotate(-2deg); }
      100% { transform: translateY(0) rotate(0deg); opacity: 1; }
    }
    @keyframes sparkleTwinkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      40% { transform: scale(1); opacity: 1; }
      70% { transform: scale(0.7); opacity: 0.8; }
    }
    @keyframes rainbowFloat {
      0% { transform: translate(0,0) scale(0.5); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(var(--rx), -260px) scale(1); opacity: 0; }
    }
    @keyframes dotDrift {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }
    .mascot-btn:hover { transform: scale(1.07) translateY(-2px); }
    .mascot-btn:active { transform: scale(0.96); }
  </style>
</helmet>

<div style="width:100%; min-height:100vh; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:32px 24px 40px; background-color:#F7F6F3; background-image: radial-gradient(#E4E2DC 1.6px, transparent 1.6px); background-size: 22px 22px; animation: dotDrift 6s linear infinite; font-family:'Nunito', sans-serif; overflow:hidden;" data-screen-label="Mascot Animation">

  <div style="display:flex; flex-direction:column; align-items:center; gap:4px; margin-top:8px;">
    <div style="font-family:'Nunito',sans-serif; font-weight:900; font-size:22px; color:#2B2B2B; letter-spacing:-0.02em;">Pip</div>
    <div style="font-family:'Nunito',sans-serif; font-weight:600; font-size:13px; color:#8A8A85;">tap a state below</div>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%; max-width:520px;">
    <svg key="{{ mode }}-{{ seq }}" width="380" height="380" viewBox="0 0 400 400" style="overflow:visible;">

      <!-- ground shadow -->
      <ellipse cx="200" cy="336" rx="86" ry="16" fill="#000000" opacity="0.08"></ellipse>

      <!-- level up glow -->
      <sc-if value="{{ isLevelup }}">
        <circle cx="200" cy="200" r="130" fill="#FFC93C" opacity="0" style="animation: glowPulse 1.1s ease-out 2;"></circle>
      </sc-if>

      <!-- rainbow particles (level up) -->
      <sc-if value="{{ isLevelup }}">
        <sc-for list="{{ rainbow }}" as="p" hint-placeholder-count="14">
          <circle cx="200" cy="230" r="{{ p.r }}" fill="{{ p.color }}" style="{{ p.style }}"></circle>
        </sc-for>
      </sc-if>

      <!-- sparkles (level up) -->
      <sc-if value="{{ isLevelup }}">
        <sc-for list="{{ sparkles }}" as="s" hint-placeholder-count="10">
          <path d="M0,-7 L2,-2 L7,0 L2,2 L0,7 L-2,2 L-7,0 L-2,-2 Z" fill="#FFC93C" transform="translate({{ s.x }},{{ s.y }})" style="{{ s.style }}"></path>
        </sc-for>
      </sc-if>

      <!-- confetti (correct) -->
      <sc-if value="{{ isCorrect }}">
        <sc-for list="{{ confetti }}" as="c" hint-placeholder-count="20">
          <rect x="-4" y="-4" width="8" height="8" fill="{{ c.color }}" transform="translate(200,190)" style="{{ c.style }}"></rect>
        </sc-for>
      </sc-if>

      <!-- crown (level up) -->
      <sc-if value="{{ isLevelup }}">
        <g style="transform-origin: 200px 60px; animation: crownDrop 1s cubic-bezier(.36,1.4,.5,1) 1;">
          <path d="M158,86 L168,50 L184,72 L200,42 L216,72 L232,50 L242,86 Z" fill="#FFC93C" stroke="#E0A415" stroke-width="3" stroke-linejoin="round"></path>
          <rect x="156" y="84" width="88" height="12" rx="3" fill="#FFDB70" stroke="#E0A415" stroke-width="3"></rect>
        </g>
      </sc-if>

      <!-- character group -->
      <g style="transform-origin: 200px 220px; {{ bodyStyle }} filter:{{ grayFilter }};">

        <!-- feet -->
        <g style="transform-origin: 176px 300px; {{ footLStyle }}">
          <ellipse cx="176" cy="304" rx="16" ry="9" fill="#E0A415"></ellipse>
        </g>
        <g style="transform-origin: 224px 300px; {{ footRStyle }}">
          <ellipse cx="224" cy="304" rx="16" ry="9" fill="#E0A415"></ellipse>
        </g>

        <!-- left wing -->
        <g style="transform-origin: 122px 220px; {{ wingLStyle }}">
          <path d="M122,180 C86,190 70,222 82,258 C96,250 120,232 128,206 Z" fill="#3D8B30"></path>
        </g>

        <!-- body -->
        <ellipse cx="200" cy="220" rx="92" ry="102" fill="#4CAF3D"></ellipse>
        <!-- ear tufts -->
        <path d="M148,120 C142,98 154,84 172,88 C160,98 156,112 160,126 Z" fill="#4CAF3D"></path>
        <path d="M252,120 C258,98 246,84 228,88 C240,98 244,112 240,126 Z" fill="#4CAF3D"></path>
        <!-- belly -->
        <ellipse cx="200" cy="240" rx="56" ry="66" fill="#FFF7DE"></ellipse>

        <!-- right wing (drawn after body so it sits in front) -->
        <g style="transform-origin: 278px 220px; {{ wingRStyle }}">
          <path d="M278,180 C314,190 330,222 318,258 C304,250 280,232 272,206 Z" fill="#3D8B30"></path>
        </g>

        <!-- head bob group: eyes + beak -->
        <g style="transform-origin: 200px 190px; {{ headStyle }}">

          <!-- eyes: normal -->
          <sc-if value="{{ showRoundEyes }}">
            <circle cx="172" cy="188" r="26" fill="#FFFFFF"></circle>
            <circle cx="228" cy="188" r="26" fill="#FFFFFF"></circle>
            <circle cx="176" cy="192" r="12" fill="#2B2B2B"></circle>
            <circle cx="232" cy="192" r="12" fill="#2B2B2B"></circle>
            <circle cx="180" cy="187" r="4" fill="#FFFFFF"></circle>
            <circle cx="236" cy="187" r="4" fill="#FFFFFF"></circle>
            <ellipse cx="172" cy="188" rx="26" ry="26" fill="#4CAF3D" style="transform-origin:172px 188px; animation: {{ blinkAnim }};"></ellipse>
            <ellipse cx="228" cy="188" rx="26" ry="26" fill="#4CAF3D" style="transform-origin:228px 188px; animation: {{ blinkAnim }};"></ellipse>
          </sc-if>

          <!-- eyes: happy arcs -->
          <sc-if value="{{ isHappy }}">
            <path d="M150,190 Q172,166 194,190" fill="none" stroke="#2B2B2B" stroke-width="7" stroke-linecap="round"></path>
            <path d="M206,190 Q228,166 250,190" fill="none" stroke="#2B2B2B" stroke-width="7" stroke-linecap="round"></path>
          </sc-if>

          <!-- eyes: wrong X -->
          <sc-if value="{{ isWrong }}">
            <g style="animation: xPop 0.35s ease-out 1;">
              <path d="M156,172 L192,206 M192,172 L156,206" stroke="#F45B69" stroke-width="7" stroke-linecap="round"></path>
              <path d="M212,172 L248,206 M248,172 L212,206" stroke="#F45B69" stroke-width="7" stroke-linecap="round"></path>
            </g>
          </sc-if>

          <!-- beak: neutral / closed -->
          <sc-if value="{{ showClosedBeak }}">
            <path d="M186,214 L200,204 L214,214 L200,222 Z" fill="#E0A415"></path>
          </sc-if>
          <!-- beak: smile (happy/dance/correct/levelup) -->
          <sc-if value="{{ showSmileBeak }}">
            <path d="M178,210 Q200,240 222,210 Q200,226 178,210 Z" fill="#E0A415"></path>
          </sc-if>
          <!-- beak: sad -->
          <sc-if value="{{ isWrong }}">
            <path d="M182,222 Q200,204 218,222 Q200,214 182,222 Z" fill="#9AA0A6"></path>
          </sc-if>

        </g>
      </g>

      <!-- green flash overlay (correct) -->
      <sc-if value="{{ isCorrect }}">
        <rect x="0" y="0" width="400" height="400" fill="#4CAF3D" opacity="0" style="animation: correctFlash 1.6s ease-out 1;"></rect>
        <g style="transform-origin: 200px 130px; opacity:0; animation: checkPop 0.7s cubic-bezier(.34,1.56,.64,1) 0.15s 1 forwards;">
          <circle cx="200" cy="130" r="34" fill="#FFFFFF" stroke="#4CAF3D" stroke-width="5"></circle>
          <path d="M184,130 L196,144 L218,116" fill="none" stroke="#4CAF3D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>
        </g>
      </sc-if>

    </svg>
  </div>

  <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:640px;">
    <sc-for list="{{ buttons }}" as="b" hint-placeholder-count="6">
      <button class="mascot-btn" onClick="{{ b.onClick }}" style="font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; padding:13px 20px; border-radius:16px; border:none; border-bottom:4px solid {{ b.borderColor }}; background:{{ b.bg }}; color:{{ b.fg }}; cursor:pointer; transition: transform 0.15s ease; box-shadow: 0 2px 0 rgba(0,0,0,0.04);">
        {{ b.label }}
      </button>
    </sc-for>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const DURATIONS = { idle: 0, happy: 1400, dance: 2600, correct: 1600, wrong: 700, levelup: 2400 };
const REVERT_DELAY = 2000;

function rand(min, max) { return min + Math.random() * (max - min); }

class Component extends DCLogic {
  state = { mode: 'idle', seq: 0 };

  constructor(props) {
    super(props);
    this._timer = null;

    const confettiColors = ['#4CAF3D', '#F45B69', '#2BB0E0', '#FFC93C', '#FFF7DE'];
    this.confetti = Array.from({ length: 20 }, (_, i) => {
      const angle = (i / 20) * Math.PI * 2 + rand(-0.15, 0.15);
      const dist = rand(85, 165);
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 30;
      const rot = rand(-260, 260);
      const delay = rand(0, 0.12);
      const dur = rand(0.9, 1.3);
      return {
        color: confettiColors[i % confettiColors.length],
        style: `--tx:${tx.toFixed(1)}px; --ty:${ty.toFixed(1)}px; --rot:${rot.toFixed(0)}deg; animation: confettiBurst ${dur.toFixed(2)}s ease-out ${delay.toFixed(2)}s 1 forwards;`
      };
    });

    this.sparkles = Array.from({ length: 10 }, (_, i) => {
      const angle = (i / 10) * Math.PI * 2;
      const r = rand(90, 150);
      const x = 200 + Math.cos(angle) * r;
      const y = 190 + Math.sin(angle) * r * 0.7;
      const delay = rand(0, 1.6);
      return { x: x.toFixed(1), y: y.toFixed(1), style: `animation: sparkleTwinkle 1.3s ease-in-out ${delay.toFixed(2)}s infinite;` };
    });

    const rainbowColors = ['#4CAF3D', '#F45B69', '#2BB0E0', '#FFC93C', '#B784E0'];
    this.rainbow = Array.from({ length: 14 }, (_, i) => {
      const rx = rand(-90, 90);
      const delay = rand(0, 1.8);
      const dur = rand(1.6, 2.4);
      const r = rand(4, 7);
      return {
        r: r.toFixed(1),
        color: rainbowColors[i % rainbowColors.length],
        style: `--rx:${rx.toFixed(0)}px; transform-box: fill-box; animation: rainbowFloat ${dur.toFixed(2)}s ease-out ${delay.toFixed(2)}s infinite;`
      };
    });

    this.buttons = [
      { id: 'idle', label: 'Idle' },
      { id: 'happy', label: 'Happy' },
      { id: 'dance', label: 'Dance' },
      { id: 'correct', label: 'Correct' },
      { id: 'wrong', label: 'Wrong' },
      { id: 'levelup', label: 'Level Up' }
    ];
  }

  trigger(mode) {
    if (this._timer) clearTimeout(this._timer);
    const seq = this.state.seq + 1;
    this.setState({ mode, seq });
    const dur = DURATIONS[mode] || 0;
    if (mode !== 'idle') {
      this._timer = setTimeout(() => {
        this.setState({ mode: 'idle', seq: this.state.seq + 1 });
      }, dur + REVERT_DELAY);
    }
  }

  componentWillUnmount() {
    if (this._timer) clearTimeout(this._timer);
  }

  getStyles(mode) {
    const s = {
      bodyStyle: '',
      wingLStyle: '',
      wingRStyle: '',
      footLStyle: '',
      footRStyle: '',
      headStyle: '',
      grayFilter: 'none',
      blinkAnim: 'none'
    };
    if (mode === 'idle') {
      s.bodyStyle = 'animation: breathe 2.4s ease-in-out infinite;';
      s.blinkAnim = 'blink 3s ease-in-out infinite';
    } else if (mode === 'happy') {
      s.bodyStyle = 'animation: happyBounce 1.4s ease-out 1;';
      s.wingLStyle = 'animation: wingFlapHappy 1.4s ease-in-out 1;';
      s.wingRStyle = 'animation: wingFlapHappy 1.4s ease-in-out 1 reverse;';
    } else if (mode === 'dance') {
      s.bodyStyle = 'animation: danceSwayBody 1.3s ease-in-out infinite;';
      s.wingLStyle = 'animation: danceWingL 1.3s ease-in-out infinite;';
      s.wingRStyle = 'animation: danceWingR 1.3s ease-in-out infinite;';
      s.footLStyle = 'animation: danceFootL 1.3s ease-in-out infinite;';
      s.footRStyle = 'animation: danceFootR 1.3s ease-in-out infinite;';
      s.headStyle = 'animation: headBop 1.3s ease-in-out infinite;';
    } else if (mode === 'correct') {
      s.bodyStyle = 'animation: happyBounce 0.9s ease-out 1;';
      s.wingLStyle = 'animation: wingFlapHappy 0.9s ease-in-out 1;';
      s.wingRStyle = 'animation: wingFlapHappy 0.9s ease-in-out 1 reverse;';
    } else if (mode === 'wrong') {
      s.bodyStyle = 'animation: wrongShake 0.6s ease-in-out 1;';
      s.grayFilter = 'grayscale(0.9) brightness(0.96)';
    } else if (mode === 'levelup') {
      s.bodyStyle = 'animation: levelupBodyPulse 1.1s ease-out 1;';
      s.wingLStyle = 'animation: wingFlapHappy 1.1s ease-in-out 1;';
      s.wingRStyle = 'animation: wingFlapHappy 1.1s ease-in-out 1 reverse;';
    }
    return s;
  }

  renderVals() {
    const mode = this.state.mode;
    const styles = this.getStyles(mode);
    const buttons = this.buttons.map(b => ({
      ...b,
      onClick: () => this.trigger(b.id),
      bg: mode === b.id ? '#3D8B30' : '#FFFFFF',
      fg: mode === b.id ? '#FFFFFF' : '#2B2B2B',
      borderColor: mode === b.id ? '#2E6E24' : '#E1DFD8'
    }));

    return {
      mode,
      seq: this.state.seq,
      isHappy: mode === 'happy',
      isDance: mode === 'dance',
      isCorrect: mode === 'correct',
      isWrong: mode === 'wrong',
      isLevelup: mode === 'levelup',
      showRoundEyes: mode !== 'happy' && mode !== 'wrong',
      showClosedBeak: mode === 'idle' || mode === 'wrong',
      showSmileBeak: mode === 'happy' || mode === 'dance' || mode === 'correct' || mode === 'levelup',
      confetti: this.confetti,
      sparkles: this.sparkles,
      rainbow: this.rainbow,
      buttons,
      bodyStyle: styles.bodyStyle,
      wingLStyle: styles.wingLStyle,
      wingRStyle: styles.wingRStyle,
      footLStyle: styles.footLStyle,
      footRStyle: styles.footRStyle,
      headStyle: styles.headStyle,
      grayFilter: styles.grayFilter,
      blinkAnim: styles.blinkAnim
    };
  }
}
</script>
</body>
</html>
