  <script>
    // Same 600px breakpoint the case study's other responsive prototype uses.
    // Desktop gets the full 48-screen admin/manager/finance/employee app —

    // A real phone gets the dedicated employee mobile flow, full-bleed.

    window.location.replace(target);
