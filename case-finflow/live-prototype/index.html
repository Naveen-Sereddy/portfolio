<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FinFlow — Interactive UI Kit</title>
  <meta name="viewport" content="width=1320"/>
  <link rel="stylesheet" href="foundations/colors_and_type.css"/>
  <link rel="stylesheet" href="foundations/components.css"/>
  <!-- Additional Google Fonts for wordmark tweaks -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&display=swap"/>
  <!-- Phosphor Icons (regular + bold + fill) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>

  <style>
    html, body, #root { height: 100%; min-height: 100%; }
    body { overflow-x: auto; overflow-y: hidden; }
    #root { min-width: 1280px; }

    /* Screen-directory launcher */
    .ff-launch {
      position: fixed; bottom: 20px; right: 20px; z-index: 50;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--ff-card); color: var(--ff-fg);
      border: 1px solid var(--ff-border-strong);
      border-radius: 999px; box-shadow: var(--ff-shadow-lg);
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .ff-launch:hover { background: var(--ff-hover); }

    /* Mobile section */
    .ff-mobile-shelf {
      display: flex; gap: 28px; padding: 48px 32px;
      background: var(--ff-card-2); border-top: 1px solid var(--ff-border);
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
      <rect width="400" height="300" fill="#1C1A17"/>
      <g transform="translate(140,80)">
        <rect width="120" height="120" rx="26" fill="#FBF5E8"/>
        <rect x="30" y="26" width="14" height="68" fill="#1C1A17"/>
        <rect x="30" y="26" width="56" height="14" fill="#1C1A17"/>
        <rect x="30" y="50" width="38" height="14" fill="#1C1A17"/>
        <circle cx="82" cy="86" r="8" fill="#D9BE57"/>
      </g>
      <text x="200" y="246" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#FBF5E8">FinFlow</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="brand/BrandMark.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="layout.jsx"></script>
  <script type="text/babel" src="screens/dashboards.jsx"></script>
  <script type="text/babel" src="screens/expenses.jsx"></script>
  <script type="text/babel" src="screens/approvals.jsx"></script>
  <script type="text/babel" src="screens/reports_cards_vendors.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>
  <script type="text/babel" src="screens/misc.jsx"></script>
  <script type="text/babel" src="screens/mobile.jsx"></script>

  <script type="text/babel">
    /* ----- Wordmark style presets ----- */
    const WORDMARK_PRESETS = {
      "Editorial italic": {
        "--ff-brand-font": '"Instrument Serif", Georgia, serif',
        "--ff-brand-style": "italic",
        "--ff-brand-weight": "400",
        "--ff-brand-letter-spacing": "-0.015em",
        "--ff-brand-size-scale": "1.05"
      },
      "Editorial roman": {
        "--ff-brand-font": '"Instrument Serif", Georgia, serif',
        "--ff-brand-style": "normal",
        "--ff-brand-weight": "400",
        "--ff-brand-letter-spacing": "-0.015em",
        "--ff-brand-size-scale": "1.05"
      },
      "Modern grotesk": {
        "--ff-brand-font": '"Geist", system-ui, sans-serif',
        "--ff-brand-style": "normal",
        "--ff-brand-weight": "700",
        "--ff-brand-letter-spacing": "-0.035em",
        "--ff-brand-size-scale": "0.92"
      },
      "Geometric": {
        "--ff-brand-font": '"Space Grotesk", system-ui, sans-serif',
        "--ff-brand-style": "normal",
        "--ff-brand-weight": "600",
        "--ff-brand-letter-spacing": "-0.025em",
        "--ff-brand-size-scale": "0.95"
      },
      "Expressive serif": {
        "--ff-brand-font": '"Fraunces", "Instrument Serif", Georgia, serif',
        "--ff-brand-style": "italic",
        "--ff-brand-weight": "500",
        "--ff-brand-letter-spacing": "-0.025em",
        "--ff-brand-size-scale": "1.0"
      },
      "Mono technical": {
        "--ff-brand-font": '"JetBrains Mono", ui-monospace, monospace',
        "--ff-brand-style": "normal",
        "--ff-brand-weight": "600",
        "--ff-brand-letter-spacing": "-0.06em",
        "--ff-brand-size-scale": "0.78"
      }
    };

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "wordmarkStyle": "Modern grotesk"
    }/*EDITMODE-END*/;

    const SCREEN_REGISTRY = [
      // Auth
      { id:"signin", group:"Auth", label:"Sign in", chrome:"fullbleed", Comp: () => <SignIn/> },
      { id:"sso", group:"Auth", label:"SSO / Workspace", chrome:"fullbleed", Comp: () => <SSOWorkspace/> },
      { id:"forgot", group:"Auth", label:"Forgot password", chrome:"fullbleed", Comp: () => <ForgotPassword/> },
      { id:"reset", group:"Auth", label:"Reset password", chrome:"fullbleed", Comp: () => <ResetPassword/> },

      // Onboarding
      { id:"onb-bank", group:"Onboarding", label:"Connect bank / cards", chrome:"fullbleed", Comp: () => <ConnectBank/> },
      { id:"onb-team", group:"Onboarding", label:"Invite team", chrome:"fullbleed", Comp: () => <InviteTeam/> },
      { id:"onb-policy", group:"Onboarding", label:"Set policy", chrome:"fullbleed", Comp: () => <SetPolicy/> },

      // Dashboards
      { id:"dashboard", group:"Dashboards", label:"Finance Admin overview", role:"finance", Comp: () => <FinanceDashboard/> },
      { id:"dashboard-mgr", group:"Dashboards", label:"Manager dashboard", role:"manager", Comp: () => <ManagerDashboard/> },
      { id:"dashboard-emp", group:"Dashboards", label:"Employee dashboard", role:"employee", Comp: () => <EmployeeDashboard/> },

      // Expenses
      { id:"expenses", group:"Expenses", label:"Expenses — list", Comp: () => <ExpenseList/> },
      { id:"expense-detail", group:"Expenses", label:"Expense detail", Comp: () => <ExpenseDetail/> },
      { id:"new-expense", group:"Expenses", label:"New expense (desktop)", Comp: () => <NewExpense/> },
      { id:"ocr", group:"Expenses", label:"Receipt OCR review", Comp: () => <OcrReview/> },
      { id:"flagged", group:"Expenses", label:"Policy flagged", Comp: () => <FlaggedExpense/> },
      { id:"import", group:"Expenses", label:"Bulk import CSV", Comp: () => <BulkImport/> },

      // Approvals
      { id:"approvals", group:"Approvals", label:"Approvals queue", Comp: () => <ApprovalsQueue/> },
      { id:"approval-detail", group:"Approvals", label:"Approval detail", Comp: () => <ExpenseDetail/> },
      { id:"approval-bulk", group:"Approvals", label:"Bulk approve (queue)", Comp: () => <ApprovalsQueue/> },
      { id:"approval-history", group:"Approvals", label:"Approval history", Comp: () => <ApprovalHistory/> },

      // Reimbursements
      { id:"reimburse", group:"Reimbursements", label:"Payouts list", Comp: () => <ReimbursementsList/> },
      { id:"payout-detail", group:"Reimbursements", label:"Payout detail", Comp: () => <PayoutDetail/> },
      { id:"schedule-payout", group:"Reimbursements", label:"Schedule payout", Comp: () => <SchedulePayout/> },

      // Reports
      { id:"reports", group:"Reports", label:"Reports home", Comp: () => <ReportsHome/> },
      { id:"report-build", group:"Reports", label:"Report builder", Comp: () => <ReportBuilder/> },
      { id:"saved-report", group:"Reports", label:"Saved report", Comp: () => <SavedReport/> },
      { id:"export-report", group:"Reports", label:"Export", Comp: () => <ExportReport/> },

      // Cards
      { id:"cards", group:"Cards", label:"Cards list", Comp: () => <CardsList/> },
      { id:"card-detail", group:"Cards", label:"Card detail", Comp: () => <CardDetail/> },
      { id:"issue-card", group:"Cards", label:"Issue new card", Comp: () => <IssueCard/> },

      // Vendors
      { id:"vendors", group:"Vendors", label:"Vendor directory", Comp: () => <VendorsList/> },
      { id:"vendor-detail", group:"Vendors", label:"Vendor detail", Comp: () => <VendorDetail/> },

      // Settings
      { id:"settings-profile", group:"Settings", label:"Profile", Comp: () => <SettingsWrapper tab="profile"/> },
      { id:"settings-security", group:"Settings", label:"Security & 2FA", Comp: () => <SettingsWrapper tab="security"/> },
      { id:"settings-team", group:"Settings", label:"Team & roles", Comp: () => <SettingsWrapper tab="team"/> },
      { id:"settings-policies", group:"Settings", label:"Policies", Comp: () => <SettingsWrapper tab="policies"/> },
      { id:"settings-integrations", group:"Settings", label:"Integrations", Comp: () => <SettingsWrapper tab="integrations"/> },
      { id:"settings-billing", group:"Settings", label:"Billing", Comp: () => <SettingsWrapper tab="billing"/> },
      { id:"settings-notif", group:"Settings", label:"Notification prefs", Comp: () => <SettingsWrapper tab="notif-prefs"/> },

      // Other
      { id:"audit", group:"Other", label:"Audit log", Comp: () => <AuditLog/> },
      { id:"notif", group:"Other", label:"Notifications center", Comp: () => <NotificationsCenter/> },
      { id:"help", group:"Other", label:"Help / Support", Comp: () => <Help/> },

      // States
      { id:"state-loading", group:"States", label:"Loading dashboard", Comp: () => <LoadingDashboard/> },
      { id:"state-empty", group:"States", label:"Empty expenses", Comp: () => <EmptyExpenses/> },
      { id:"state-error", group:"States", label:"Error", Comp: () => <ErrorState/> },
      { id:"state-success", group:"States", label:"Success — approval", Comp: () => <SuccessApproval/> },
      { id:"state-confirm", group:"States", label:"Confirmation — payout scheduled", Comp: () => <ConfirmReimbursement/> },

      // Mobile
      { id:"mobile-flow", group:"Mobile", label:"Employee mobile flow (6 screens)", chrome:"mobile", Comp: () => <MobileShelf/> }
    ];

    const SettingsWrapper = ({ tab }) => {
      const [active, setActive] = React.useState(tab);
      const map = {
        profile: <SettingsProfile/>,
        security: <SettingsSecurity/>,
        team: <SettingsTeam/>,
        policies: <SettingsPolicies/>,
        integrations: <SettingsIntegrations/>,
        billing: <SettingsBilling/>,
        "notif-prefs": <SettingsNotifPrefs/>
      };
      return <SettingsShell active={active} setActive={setActive}>{map[active]}</SettingsShell>;
    };

    const MobileShelf = () => (
      <>
        <PageHead eyebrow="Mobile · Employee POV" title="iOS — expense submission flow"
          sub="Iris submits a $42.80 coffee expense in 6 taps."/>
        <div className="ff-mobile-shelf ff-scroll" style={{borderRadius:'var(--ff-radius-lg)', border:'1px solid var(--ff-border)'}}>
          <MobileSignIn/>
          <MobileHome/>
          <MobileSnapReceipt/>
          <MobileNewExpense/>
          <MobileSubmitSuccess/>
          <MobileStatusTimeline/>
        </div>
      </>
    );

    const DEFAULT_BY_ROLE = { finance: "dashboard", manager: "dashboard-mgr", employee: "dashboard-emp" };

    const useLocalStorage = (k, init) => {
      const [v, setV] = React.useState(() => {
        try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : init; } catch { return init; }
      });
      React.useEffect(() => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }, [k, v]);
      return [v, setV];
    };

    /* ----- Screen Directory ----- */
    const ScreenDirectory = ({ open, onClose, current, onPick }) => {
      const [q, setQ] = React.useState("");
      const groups = {};
      SCREEN_REGISTRY.forEach(s => {
        if (q && !s.label.toLowerCase().includes(q.toLowerCase()) && !s.group.toLowerCase().includes(q.toLowerCase())) return;
        (groups[s.group] = groups[s.group] || []).push(s);
      });
      if (!open) return null;
      return (
        <div className="ff-modal-backdrop" onClick={onClose}>
          <div className="ff-modal" onClick={e => e.stopPropagation()} style={{maxWidth:680, padding:0}}>
            <div style={{padding:'14px 18px', borderBottom:'1px solid var(--ff-border)'}}>
              <div className="ff-search">
                <Icon name="magnifying-glass" size={14}/>
                <input autoFocus placeholder="Jump to screen…" value={q} onChange={e=>setQ(e.target.value)}/>
                <span className="ff-kbd">ESC</span>
              </div>
            </div>
            <div className="ff-scroll" style={{maxHeight:460, overflow:'auto', padding:'6px 0'}}>
              {Object.entries(groups).map(([g, items]) => (
                <div key={g}>
                  <div className="ff-sidebar__label" style={{padding:'10px 18px 6px'}}>{g}</div>
                  <div style={{padding:'0 8px'}}>
                    {items.map(s => (
                      <a key={s.id} href="#"
                         className="ff-nav-item"
                         aria-current={current === s.id ? "page" : undefined}
                         onClick={(e) => { e.preventDefault(); onPick(s.id); onClose(); }}>
                        <Icon name="arrow-elbow-down-right" size={14} style={{opacity:0.4}}/>
                        <span>{s.label}</span>
                        <span className="ff-nav-item__count" style={{fontFamily:'var(--ff-font-mono)'}}>{s.id}</span>
                      </a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 18px', borderTop:'1px solid var(--ff-border)', fontSize:11, color:'var(--ff-fg-muted)'}}>
              <span className="ff-kbd">⌘K</span> open · <span className="ff-kbd">↑↓</span> navigate · <span className="ff-kbd">↵</span> select
            </div>
          </div>
        </div>
      );
    };

    /* ----- App ----- */
    const App = () => {
      const [theme, setTheme] = useLocalStorage("ff-theme", "light");
      const [role, setRole] = useLocalStorage("ff-role", "finance");
      const [screen, setScreen] = useLocalStorage("ff-screen", "dashboard");
      const [dirOpen, setDirOpen] = React.useState(false);
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      // Apply wordmark CSS vars whenever the tweak changes
      React.useEffect(() => {
        const preset = WORDMARK_PRESETS[t.wordmarkStyle] || WORDMARK_PRESETS["Editorial italic"];
        Object.entries(preset).forEach(([k, v]) => {
          document.documentElement.style.setProperty(k, v);
        });
      }, [t.wordmarkStyle]);

      React.useEffect(() => {
        const onKey = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
            e.preventDefault(); setDirOpen(o => !o);
          }
          if (e.key === "Escape") setDirOpen(false);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const onRole = (r) => {
        setRole(r);
        // If currently on a role-specific dashboard, switch to the new role's dashboard.
        const cur = SCREEN_REGISTRY.find(s => s.id === screen);
        if (cur && cur.group === "Dashboards") setScreen(DEFAULT_BY_ROLE[r]);
      };

      const onNavigate = (id) => {
        // Map sidebar id → screen id (mostly 1:1; map a few aliases)
        const alias = {
          "dashboard-mgr": "dashboard-mgr",
          "dashboard-emp": "dashboard-emp",
          "my-expenses": "expenses",
          "my-reimburse": "reimburse",
          "my-cards": "cards",
          "team": "settings-team",
          "policies": "settings-policies",
          "integrations": "settings-integrations",
          "settings": "settings-profile",
          "notif": "notif",
          "help": "help",
          "budgets": "saved-report"
        };
        setScreen(alias[id] || id);
      };

      const entry = SCREEN_REGISTRY.find(s => s.id === screen) || SCREEN_REGISTRY[0];
      const Comp = entry.Comp;
      const fullbleed = entry.chrome === "fullbleed";

      return (
        <div style={{height:'100%'}}>
          {fullbleed ? (
            <div style={{height:'100%', overflow:'auto'}} className="ff-scroll">
              <Comp/>
            </div>
          ) : (
            <div className="ff-app">
              <Sidebar role={role} current={screen} onNavigate={onNavigate}/>
              <div className="ff-main">
                <TopBar role={role} theme={theme}
                        onTheme={() => setTheme(theme === "light" ? "dark" : "light")}
                        onRole={onRole}
                        onNotif={() => setScreen("notif")}/>
                <div className="ff-page ff-scroll"><Comp/></div>
              </div>
            </div>
          )}
          <button className="ff-launch" onClick={() => setDirOpen(true)}>
            <Icon name="magnifying-glass" size={14}/>
            All screens
            <span className="ff-kbd" style={{marginLeft:6}}>⌘K</span>
          </button>
          <ScreenDirectory open={dirOpen} onClose={() => setDirOpen(false)} current={screen} onPick={setScreen}/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
