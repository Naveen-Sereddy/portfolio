<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FinFlow — Interactive UI Kit</title>
  <meta name="viewport" content="width=1320"/>
  <link rel="stylesheet" href="../../foundations/colors_and_type.css"/>
  <link rel="stylesheet" href="../../foundations/components.css"/>
  <!-- Additional Google Fonts for wordmark tweaks -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&display=swap"/>
  <!-- Phosphor Icons (regular + bold + fill) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>

  <style>
    html, body, #root { height: 100%; min-height: 100%; }
    body { overflow-x: auto; overflow-y: hidden; }
    #root { min-width: 1280px; }

    /* Screen-directory launcher */
    .ff-launch {
      position: fixed; bottom: 20px; right: 20px; z-index: 50;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--ff-card); color: var(--ff-fg);
      border: 1px solid var(--ff-border-strong);
      border-radius: 999px; box-shadow: var(--ff-shadow-lg);
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .ff-launch:hover { background: var(--ff-hover); }

    /* Mobile section — frames pre-scaled via MobileThumb so all 6 fit one viewport without horizontal scroll */
    .ff-mobile-shelf {
      display: flex; gap: 20px; padding: 32px;
      background: var(--ff-card-2); border-top: 1px solid var(--ff-border);
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
      <rect width="400" height="300" fill="#15181c"/>
      <g transform="translate(140,80)">
        <polygon points="60,0 112,28 60,56 8,28" fill="#fff" stroke="#15181c" stroke-width="4"/>
        <polygon points="8,28 60,56 60,112 8,84" fill="#15181c"/>
        <polygon points="112,28 112,84 60,112 60,56" fill="#3d9b8f"/>
      </g>
      <text x="200" y="246" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="26" fill="#fff">FinFlow</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="../../brand/BrandMark.js"></script>
  <script src="tweaks-panel.js"></script>
  <script src="charts.js"></script>
  <script src="layout.js"></script>
  <script src="screens/dashboards.js"></script>
  <script src="screens/expenses.js"></script>
  <script src="screens/approvals.js"></script>
  <script src="screens/reports_cards_vendors.js"></script>
  <script src="screens/settings.js"></script>
  <script src="screens/misc.js"></script>
  <script src="screens/mobile.js"></script>

  <script src="app.js"></script>
</body>
</html>
